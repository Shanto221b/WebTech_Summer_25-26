<!DOCTYPE html>
<html lang="en-US">

<head>
    <title> Shanto LabTask 2 </title>
     <link rel="stylesheet" href="../Design/Style.css">

</head>

<body>
    <div class="container">
       
        <fieldset>
            <legend> Student Information </legend>

            <form>
                <table>
                    <tr>
                        <td><label for="fullname"> Full Name : </label>
                            <br>
                            <input type="text" id="fullname" name="fullname" placeholder="Enter Your full Name">

                        </td>

                        <td><label for="Email"> Email : </label>
                            <br>
                            <input type="email" id="Email" name="Email" placeholder="Enter Your Email">
                        </td>

                    </tr>



                    <tr>
                        <td><label for="Password"> Password: </label> <br>
                            <input type="password" id="Password" name="Password " placeholder="Enter Your secure Password">
                        </td>

                        <td><label for="age"> Age: </label> <br>
                            <input type="number" id="age" name="age" placeholder="Enter Your Age">
                        </td>


                    </tr>






                    <tr>
                        <td><label for="experimentaldate"> Experimental date : </label> <br>
                            <input type="date" id="experimentaldate" name="experimentaldate">
                        </td>

                        <td><label for="Phone"> Phone Number : </label><br>
                            <input type="text" id="Phone" name="Phone" placeholder="+8801XXXXXXXXX">
                        </td>



                    </tr>





                </table>
        </fieldset>





        <input type="submit" id="submit" name="submit" value=SignUp>
        <input type="reset" id="reset" name="reset" value=Clear>


        </form>
    </div>
</body>

</html
