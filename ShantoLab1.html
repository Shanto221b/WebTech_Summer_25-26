<!DOCTYPE html>
<html lang="en-US">

<head>
    <title> LabTask </title>
</head>

<body>
    <div class="container">
        <h1> User Registartion Form </h1>
        <fieldset>
            <legend> Personal Information </legend>

            <form>
                <table>
                    <tr>
                        <td><label for="fname"> First Name : </label></td>
                        <td><input type="text" id="fname" name="fname" placeholder="Enter Your Name"></td>
                    </tr>
                    <tr>
                        <td><label for="Lname"> Last Name : </label></td>
                        <td><input type="text" id="Lname" name="Lname" placeholder="Enter Your Name"></td>
                    </tr>
                    <tr>
                        <td><label for="DOB"> DOB : </label> </td>
                        <td><input type="date" id="DOB" name="DOB"></td>
                    </tr>

                    <tr>
                        <td><label for="Gender"> Gender : </label> </td>
                        <td>
                            <input type="radio" id="male" name="male">
                            <label for="male"> male </label>

                            <input type="radio" id="female" name="female">
                            <label for="female"> female </label>

                            <input type="radio" id="other" name="other">
                            <label for="other"> other </label>

                        </td>

                </table>
            </form>
        </fieldset>

    </div>


  

    <div class="container">
        <fieldset>
            <legend>contact info</legend>
            <form>

                <table>
                    <tr>
                        <td><label for="email"> Email : </label></td>
                        <td><input type="text" id="email" name="email" placeholder="Enter Your Name"></td>
                    </tr>

                    <tr>
                        <td><label for="phonenumber"> phonenumber: </label></td>
                        <td><input type="email" id="phonenumber" name="phonenumber" placeholder="Enter Your Name"></td>
                    </tr>

                    <tr>
                        <td><label for="address"> address : </label></td>
                        <td><input type="text" id="address" name="address" placeholder="Enter Your Name"></td>
                    </tr>

                    <tr>
                        <td> <label for="country"> Choose country: </label> </td>
                        <td>
                            <select id="country">
                                <option id="Default"> -------------- Select Country ----------- </option>
                                <option id="BD"> Bangladesh </option>
                                <option id="USA"> USA </option>
                                <option id="UK"> USA </option>
                                <option id="Argentina"> Argentina </option>
                            </select>
                        </td>
                    </tr>


                </table>



            </form>

        </fieldset>



    </div>




    <div class="container">
        <fieldset>
            <legend> User Account Information </legend>
            <table>
                <tr>
                    <td><label for="username"> User Name: </label> </td>
                    <td><input type="text" id="username" name="username"></td>
                </tr>
                <tr>
                    <td><label for="Password"> Password: </label> </td>
                    <td><input type="password" id="Password" name="Password"></td>
                </tr>

                <tr>
                    <td><label for="CPassword"> Confirm Password: </label> </td>
                    <td><input type="password" id="CPassword" name="CPassword"></td>
                </tr>







            </table>
        </fieldset>



    </div>


    <div class="container">
        <fieldset>
            <legend>Preference</legend>

            <table>

                <tr>
                    <td><label for="Profession"> User Profession : </label> </td>
                    <td>
                        <input type="checkbox" id="sports" name="Profession">
                        <label for="sports"> sports </label>
                        <br>
                        <input type="checkbox" id="music" name="Profession">
                        <label for="music"> music </label>
                        <br>
                        <input type="checkbox" id="reading" name="Profession">
                        <label for="reading"> reading </label>
                    </td>

                </tr>

                <tr>
                    <td><input type="checkbox" id="Condition" name="condtion">
                        <label for="Condition">
                            <font color="red">I have Agreed Terms and Conditions*</font>
                        </label>
                    </td>
                </tr>




            </table>





        </fieldset>
    </div>


    <input type="submit" id="submit" name="submit" value=SignUp>
    <input type="reset" id="reset" name="reset" value="Clear Form">







</body>

</html
